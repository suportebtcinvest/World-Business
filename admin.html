<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - World Business</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>World Business</h1>
        <h2>Painel Administrativo</h2>
    </header>

    <main class="admin-container">

        <h2>Usuários Cadastrados</h2>

        <table class="tabela-admin">

            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Plano</th>
                    <th>Status</th>
                    <th>Saldo</th>
                    <th>Ação</th>
                </tr>
            </thead>

            <tbody id="listaUsuarios">
                <!-- Os usuários aparecerão aqui automaticamente -->
            </tbody>

        </table>

    </main>

    <script type="module" src="admin.js"></script>

</body>
</html>
