<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - World Business</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <div class="logo">
            🌎 <span>WORLD BUSINESS</span>
        </div>

        <div class="botoes">
            <a href="index.html">
                <button class="login">Voltar</button>
            </a>
        </div>

    </header>

    <section class="cadastro-section">

        <h2>Cadastro World Business</h2>

        <p>
            Preencha os dados abaixo para criar sua conta.
        </p>

        <form>

            <input type="text" placeholder="Nome Completo" required>

            <input type="tel" placeholder="Contato (WhatsApp)" required>

            <input type="text" placeholder="CPF" required>

            <input type="text" placeholder="Nome do Indicador">

            <input type="email" placeholder="E-mail" required>

            <input type="password" placeholder="Criar Senha" required>

            <button type="submit">
                Criar Conta
            </button>

        </form>

    </section>

</body>

</html>
