<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - World Business</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="logo">
        🌎 <span>WORLD BUSINESS</span>
    </div>

    <div class="botoes">
        <a href="index.html">
            <button class="login" type="button">Voltar</button>
        </a>
    </div>

</header>

<section class="cadastro-section">

    <h2>Cadastro World Business</h2>

    <p>Preencha os dados abaixo para criar sua conta.</p>

    <form id="cadastroForm">

        <input type="text" id="nome" placeholder="Nome Completo" required>

        <input type="tel" id="telefone" placeholder="Contato (WhatsApp)" required>

        <input type="text" id="cpf" placeholder="CPF" required>

        <input type="text" id="indicador" placeholder="Nome do Indicador">

        <input type="email" id="email" placeholder="E-mail" required>

        <input type="password" id="senha" placeholder="Criar Senha" required>

        <button type="submit">
            Criar Conta
        </button>

    </form>

</section>

<script type="module" src="script.js"></script>

</body>
</html>
