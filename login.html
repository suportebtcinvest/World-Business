<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - World Business</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <div class="logo">
            🌎 <span>WORLD BUSINESS</span>
        </div>

        

    </header>

    <section class="cadastro-section">

        <h2>Login World Business</h2>

        <p>
            Conectando pessoas a oportunidades.
        </p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="E-mail"
                required
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
                required
            >

            <button type="submit">Entrar</button>

<a href="#" id="recuperarSenha">Esqueceu sua senha?</a>

        </form>

        <p style="margin-top:20px;">
            Ainda não possui uma conta?
            <a href="cadastro.html">Criar Conta</a>
        </p>
        <br>

<a href="index.html">
    <button type="button" class="login">Voltar</button>
</a>

    </section>

    <script type="module" src="login.js"></script>

</body>

</html>
